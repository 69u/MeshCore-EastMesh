[LilyGo_LoRa32_T3_V161]
extends = esp32_base
board = ttgo-lora32-v21
build_unflags = -Os
build_type = release
board_build.partitions = huge_app.csv ; 3MB app — required for observer on 4MB flash (LilyGo default)
build_flags =
  ${esp32_base.build_flags}
  -I variants/lilygo_lora32_t3_v161
  -Os -ffunction-sections -fdata-sections
  -D LILYGO_LORA32_T3_V161
  -D P_LORA_DIO_0=26
  -D P_LORA_DIO_1=33
  -D P_LORA_NSS=18
  -D P_LORA_RESET=23
  -D P_LORA_SCLK=5
  -D P_LORA_MISO=19
  -D P_LORA_MOSI=27
  -D P_LORA_TX_LED=25
  -D PIN_BOARD_SDA=21
  -D PIN_BOARD_SCL=22
  -D PIN_OLED_RESET=-1
  -D P_BOARD_SPI_SCK=14
  -D P_BOARD_SPI_MISO=2
  -D P_BOARD_SPI_MOSI=15
  -D P_BOARD_SPI_CS=13
  -D PIN_VBAT_READ=35
  -D PIN_USER_BTN=0
  -D ARDUINO_LOOP_STACK_SIZE=16384
  -D RADIO_CLASS=CustomSX1276
  -D WRAPPER_CLASS=CustomSX1276Wrapper
  -D SX127X_CURRENT_LIMIT=120
  -D LORA_TX_POWER=20
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/lilygo_lora32_t3_v161>
lib_deps =
  ${esp32_base.lib_deps}
  adafruit/Adafruit SSD1306 @ ^2.5.13

; === LilyGo LoRa32 T3 V1.6.1 (SX1276/SX1278) environments ===
[env:LilyGo_LoRa32_T3_V161_repeater]
extends = LilyGo_LoRa32_T3_V161
build_src_filter = ${LilyGo_LoRa32_T3_V161.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<../examples/simple_repeater>
build_flags =
  ${LilyGo_LoRa32_T3_V161.build_flags}
  -D DISPLAY_CLASS=SSD1306Display
  -D ADVERT_NAME='"T3-V1.6.1 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
lib_deps =
  ${LilyGo_LoRa32_T3_V161.lib_deps}
  ${esp32_ota.lib_deps}

[env:LilyGo_LoRa32_T3_V161_repeater_bridge_espnow]
extends = LilyGo_LoRa32_T3_V161
build_src_filter = ${LilyGo_LoRa32_T3_V161.build_src_filter}
  +<helpers/bridges/ESPNowBridge.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<../examples/simple_repeater>
build_flags =
  ${LilyGo_LoRa32_T3_V161.build_flags}
  -D DISPLAY_CLASS=SSD1306Display
  -D ADVERT_NAME='"ESPNow Bridge"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D WITH_ESPNOW_BRIDGE=1
lib_deps =
  ${LilyGo_LoRa32_T3_V161.lib_deps}
  ${esp32_ota.lib_deps}

[env:LilyGo_LoRa32_T3_V161_companion_radio_wifi]
extends = LilyGo_LoRa32_T3_V161
build_flags =
  ${LilyGo_LoRa32_T3_V161.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=SSD1306Display
  -D MAX_CONTACTS=160
  -D MAX_GROUP_CHANNELS=8
  -D WIFI_SSID='"ssid"'
  -D WIFI_PWD='"password"'
  -D WIFI_DEBUG_LOGGING=1
  -D OFFLINE_QUEUE_SIZE=128
build_src_filter = ${LilyGo_LoRa32_T3_V161.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${LilyGo_LoRa32_T3_V161.lib_deps}
  densaugeo/base64 @ ~1.4.0

; 433 MHz SX1278 variant — use if your board is the 433 MHz model
[env:LilyGo_LoRa32_T3_V161_sx1278_repeater_observer]
extends = env:LilyGo_LoRa32_T3_V161_repeater_observer
build_flags =
  ${env:LilyGo_LoRa32_T3_V161_repeater_observer.build_flags}
  -D LORA_FREQ=433.775
