name: EastMesh Build Observer ESP-NOW Firmwares

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "observer-bridge-espnow-eastmesh-v*"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OFFICIAL_MESHCORE_VERSION: ${{ vars.OFFICIAL_MESHCORE_VERSION }}
      PLATFORMIO_BUILD_FLAGS: -UMQTT_DEBUG
    steps:
      - name: Clone Repo
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Firmwares
        run: /usr/bin/env bash eastmesh-build.sh build-observer-espnow-firmwares

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: observer-espnow-firmwares
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Observer ESP-NOW Bridge Firmware ${{ env.RELEASE_VERSION }}
          body: ""
          draft: true
          files: out/*
